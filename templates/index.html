<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop and Fertilizer Recommendation</title>
</head>
<body>
    <h1>Crop and Fertilizer Recommendation</h1>
    <form action="/predict" method="POST">
        <label for="nitrogen">Nitrogen (N):</label><br>
        <input type="number" id="nitrogen" name="nitrogen" required><br>
        
        <label for="phosphorus">Phosphorus (P):</label><br>
        <input type="number" id="phosphorus" name="phosphorus" required><br>
        
        <label for="potassium">Potassium (K):</label><br>
        <input type="number" id="potassium" name="potassium" required><br>
        
        <label for="temperature">Temperature (°C):</label><br>
        <input type="number" step="0.1" id="temperature" name="temperature" required><br>
        
        <label for="humidity">Humidity (%):</label><br>
        <input type="number" step="0.1" id="humidity" name="humidity" required><br>
        
        <label for="ph">pH Level:</label><br>
        <input type="number" step="0.1" id="ph" name="ph" required><br>
        
        <label for="rainfall">Rainfall (mm):</label><br>
        <input type="number" step="0.1" id="rainfall" name="rainfall" required><br><br>
        
        <button type="submit">Submit</button>
    </form>
</body>
</html>
